<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ video.name }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "SF Mono", "Cascadia Mono", "Consolas", monospace;
            background: #111;
            color: #aaa;
            padding: 2rem;
            line-height: 1.5;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .back-link {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border: 1px solid #333;
            color: #555;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: lowercase;
            letter-spacing: 0.03em;
        }
        .back-link:hover {
            color: #aaa;
            border-color: #555;
        }
        .title {
            color: #ccc;
            font-size: 0.85rem;
            font-weight: normal;
            margin: 1rem 0;
        }
        video {
            width: 100%;
            max-height: 75vh;
            background: #0a0a0a;
            display: block;
            border: 1px solid #222;
        }
        .meta {
            margin-top: 0.75rem;
            font-size: 0.7rem;
            color: #555;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            gap: 1px;
        }
        .nav a, .nav span {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.25rem;
            border: 1px solid #222;
            font-size: 0.75rem;
            min-width: 44px;
            min-height: 44px;
        }
        .nav a {
            color: #555;
            text-decoration: none;
            gap: 0.5rem;
        }
        .nav a:hover {
            color: #aaa;
            border-color: #444;
            background: #161616;
        }
        .nav a:active { transform: translateY(1px); }
        .nav span { color: #2a2a2a; border-color: #1a1a1a; }
        .nav-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 35vw;
        }
        .nav-next { margin-left: auto; }
        @media (max-width: 600px) {
            body { padding: 0; }
            .container { padding: 1rem; }
            .nav a, .nav span { padding: 1rem; }
            .nav-name { max-width: 28vw; }
        }
    </style>
  </head>
  <body>
    <div class="container">
        <a id="back-link" class="back-link" href="/">&larr; back</a>
        <h1 class="title">{{ video.name }}</h1>
        <video preload="none" controls playsinline>
            <source src="{{ video.path }}" type="video/{{ video.extension }}">
        </video>
        <div class="meta">{{ crate::media::format_size(video.size) }}</div>
        <div class="nav">
            {% if let Some(name) = prev %}
                <a href="/v/{{ name }}?sort={{ sort.as_str() }}&dir={{ dir.as_str() }}" class="nav-prev">
                    &larr; <span class="nav-name">{{ name }}</span>
                </a>
            {% else %}
                <span class="nav-prev">&larr;</span>
            {% endif %}
            {% if let Some(name) = next %}
                <a href="/v/{{ name }}?sort={{ sort.as_str() }}&dir={{ dir.as_str() }}" class="nav-next">
                    <span class="nav-name">{{ name }}</span> &rarr;
                </a>
            {% else %}
                <span class="nav-next">&rarr;</span>
            {% endif %}
        </div>
    </div>
    <script>
      const backLink = document.getElementById('back-link');
      if (backLink && window.history.length > 1) {
        backLink.addEventListener('click', event => {
          event.preventDefault();
          window.history.back();
        });
      }

      const video = document.querySelector('video');

      document.addEventListener('keydown', e => {
        if (document.activeElement.tagName === 'INPUT') return;
        if (e.key === ' ' || e.key === 'k') {
          e.preventDefault();
          video.paused ? video.play() : video.pause();
        }
        if (e.key === 'j') video.currentTime -= 10;
        if (e.key === 'l') video.currentTime += 10;
        if (e.key === 'f') {
          document.fullscreenElement ? document.exitFullscreen() : video.requestFullscreen();
        }
        if (e.key === 'ArrowLeft' || e.key === '<') {
          const prev = document.querySelector('a.nav-prev');
          if (prev) prev.click();
        }
        if (e.key === 'ArrowRight' || e.key === '>') {
          const next = document.querySelector('a.nav-next');
          if (next) next.click();
        }
      });
    </script>
  </body>
</html>
